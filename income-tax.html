<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Tax Calculator India 2025 - TaxCalcIndia</title>
<style>
body{font-family:Arial;background:#f2f6ff;padding:20px}
.box{max-width:550px;margin:auto;background:#fff;padding:25px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
h2{text-align:center;color:#1d4ed8}
input,button{width:100%;padding:12px;margin-top:10px;border:1px solid #ccc;border-radius:10px}
button{background:#1d4ed8;color:#fff;font-weight:bold;border:none}
.result{margin-top:15px;background:#eef4ff;padding:15px;border-radius:12px}
</style>
</head>
<body>
<div class="box">
<h2>Income Tax Calculator</h2>

<input type="number" id="income" placeholder="Enter Annual Income">

<button onclick="calcTax()">Calculate Tax</button>

<div class="result" id="result">Enter income and click calculate</div>
</div>

<script>
function oldTax(income){
let tax=0;
if(income>250000){
tax += Math.min(income-250000,250000)*0.05;
}
if(income>500000){
tax += Math.min(income-500000,500000)*0.20;
}
if(income>1000000){
tax += (income-1000000)*0.30;
}
return tax;
}

function newTax(income){
let tax=0;
if(income>300000){
tax += Math.min(income-300000,300000)*0.05;
}
if(income>600000){
tax += Math.min(income-600000,300000)*0.10;
}
if(income>900000){
tax += Math.min(income-900000,300000)*0.15;
}
if(income>1200000){
tax += Math.min(income-1200000,300000)*0.20;
}
if(income>1500000){
tax += (income-1500000)*0.30;
}
return tax;
}

function calcTax(){
let income=parseFloat(document.getElementById('income').value)||0;

let oldR=oldTax(income);
let newR=newTax(income);

let better = oldR<newR ? "Old Regime Better" : "New Regime Better";

document.getElementById('result').innerHTML=
"Old Regime Tax: ₹"+oldR.toFixed(2)+
"<br>New Regime Tax: ₹"+newR.toFixed(2)+
"<br><b>"+better+"</b>";
}
</script>

</body>
</html>
